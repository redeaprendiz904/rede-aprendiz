<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página com Sidebar</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        min-height: 100vh;
        background-color: #f4f4f4;
    }


    .sidebar {
        width: 250px;
        background: #1e293b;
        color: white;
        padding: 20px;
        transition: 0.3s;
    }

    .sidebar h2 {
        margin-bottom: 20px;
        text-align: center;
        color: #f4f4f4;
    }

    .sidebar ul {
        list-style: none;
    }

    .sidebar ul li {
        margin: 15px 0;
    }

    .sidebar ul li a {
        text-decoration: none;
        color: white;
        padding: 10px;
        display: block;
        border-radius: 5px;
        transition: 0.3s;
        
    }
    
    .sidebar ul li a:hover {
        background: #334155;
    }

    .logout{
        text-decoration: none;
        background-color: #ff3131;
        color: white;
        padding: 10px;
        display: block;
        text-align: center;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.2s;
    }


    .logout:hover{
        background-color: #d00000;
    }
    .content {
        flex: 1;
        padding: 40px;
    }

    .content h1 {
        margin-bottom: 20px;
    }

    /* Responsivo */
    @media (max-width: 768px) {
        .sidebar {
            width: 250px;
        }

        .sidebar h2 {
  
        }

        .sidebar ul li a {
            text-align: center;
            padding: 10px 0;
        }
    }
</style>
</head>

<body>
<header> 
    <a href="../../index.html"><img src="../img/logop.png" alt="logoredeaprendiz"></a>

<div class="sidebar">
    <h2>Minha Sidebar</h2>
        <ul class="menu">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="estudantes.html">👩‍🎓 Estudantes</a></li>
            <li><a href="empresas.html">🏢 Empresas</a></li>
            <li><a href="vagas.html">📄 Vagas de Estágio</a></li>
            <li><a href="relatorios.html">📊 Relatórios</a></li>       
        </ul>
        <a href="../index.html" class="logout">Sair</a>
</div>
