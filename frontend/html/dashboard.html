<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="../css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/dashboard.js" defer></script>
</head>

<body>

<div class="sidebar">
    <h2>Rede Aprendiz</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/empresas">Empresas</a>
    <a href="/perfil">Perfil</a>
    <a href="/logout">Sair</a>
</div>





<div class="container">

    <div class="top">
        <div class="logo">RedeAprendiz</div>
        <div class="mensagens">💬 99+ Mensagens <span>Não Lidas</span></div>
    </div>

    <h2>Bem vindo, <span id="nomeUsuario">...</span>!</h2>

    <div class="cards">
        <div class="card">
            <h3>Novas vagas</h3>
            <h1>+116 vagas</h1>
        </div>

        <div class="card">
            <h3>Inscrições</h3>
            <h1>0 inscrições</h1>
        </div>

        <div class="card">
            <h3>Seu Perfil</h3>
            <div class="barra">
                <div class="progresso"></div>
            </div>
            <p>70% concluído</p>
        </div>

        <div class="card">
            <h3>Cursos</h3>
            <h1>+3 Cursos</h1>
        </div>
    </div>

    <div class="baixo">
        <div class="grafico">
            <h3>Performance</h3>
            <p>3 cursos | +20h</p>
             <canvas id="meuGrafico"></canvas>
    </div>

        <div class="empresas">
            <h3>Empresas contratando</h3>
            <div class="empresa">🏢 VALE abriu vagas</div>
            <div class="empresa">🏢 VALE abriu vagas</div>
        </div>
    </div>

</div>

</body>
</html>
