<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Área do Estudante</title>
  <link rel="stylesheet" href="../css/vagas.css">

  
</head>

<body>

<header>
  <img src="../img/logop.png" alt="logo">
</header>

<section class="hero">
<div class="container">

  <div class="section">
    <h2>Vagas disponíveis</h2>

    <div class="cards" id="listaVagas"></div>
  </div>

  <div class="section">
    <h2>Dicas para conciliar</h2>
    <div class="cards">

      <div class="card">
        <p><strong>Organize seu tempo</strong></p>
        <p>Tenha horários para estudar, trabalhar e descansar.</p>
      </div>

      <div class="card">
        <p><strong>Priorize a escola</strong></p>
        <p>A educação deve sempre vir em primeiro lugar.</p>
      </div>

      <div class="card">
        <p><strong>Converse no trabalho</strong></p>
        <p>Avise sobre provas e atividades importantes.</p>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>Criar perfil</h2>

    <div class="card">

     <input type="text" id="nome" placeholder="Nome">

<input type="number" id="idade" placeholder="Idade">

<select id="turno">
  <option>Turno que estuda</option>
  <option>Manhã</option>
  <option>Tarde</option>
  <option>Noite</option>
</select>

<select id="hr-disponivel">
  <option value="" disabled selected>Horário Disponível</option>
  <option>Manhã</option>
  <option>Tarde</option>
  <option>Noite</option>
</select>

<button id="btnPerfil">Criar perfil</button>

    </div>
  </div>

</div>
</section>

<footer>
  © 2026 - Rede Aprendiz
</footer>

  <script src="../js/vagas.js"></script>
<script src="../js/perfil.js"></script>
</body>
</html>
